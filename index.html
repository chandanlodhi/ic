    <script> 
        
    // 1. ब्राउज़र मेमोरी से नाम उठाने की कोशिश करें
let name = localStorage.getItem("userName");

// 2. अगर नाम नहीं मिलता (पहली बार में), तो prompt दिखाएं
if (!name) {
    name = prompt("Enter Your Name!") ?? "User";
    localStorage.setItem("userName", name); // नाम को सेव करें
}

// 3. डिस्प्ले करें
document.getElementById("name").innerHTML = `Hi ${name} 💵 Check Incentive`;

// 4. Edit Name फंक्शन (वही 'name' वेरिएबल रिसेट करने के लिए)
function editName() {
    localStorage.removeItem("userName");
    location.reload();
}

   
        
    document.getElementById('calculate').addEventListener('click', (e) => {
        e.preventDefault();
		document.getElementById('result').style.display = 'block';
        // Read and validate input values
        const workingDays = parseInt(document.getElementById('workingDays').value) || 0;
        const meta1 = parseInt(document.getElementById('meta1').value) || 0;
        const meta2 = parseInt(document.getElementById('meta2').value) || 0;
        const annotation = parseInt(document.getElementById('annotation').value) || 0;

        // Optional: If any field is still empty, show a warning
        if (
            document.getElementById('workingDays').value === "" ||
            document.getElementById('meta1').value === "" ||
            document.getElementById('meta2').value === "" ||
            document.getElementById('annotation').value === ""
        ) {
            document.getElementById('result').innerHTML = `<p style="color:red;">Please fill in all fields!</p>`;
            document.getElementById('greet').innerHTML = "";
            return;
        }

        // Perform calculations
        const parseValue = 90.12 * workingDays;
        const totalpar = (meta1 * 45.06 + meta2 * 47.43 + annotation * 7.51) / 100;
        const inper = totalpar - parseValue;

        // Use 'let' for a variable that will be reassigned
const inputNumber = inper;
let incentive=0;
if (inputNumber >= 1 && inputNumber <= 200) {
  incentive = inputNumber * 3.33;
} else if (inputNumber >= 201 && inputNumber <= 300) {
  incentive = inputNumber * 4.84;
} else if (inputNumber >= 301) { // Assuming 301 and above
  incentive = inputNumber * 6.33;}
  
  

        
        const achieved = (totalpar/(parseValue/100));
        // User Name
        /*function myFunction() {
            alert("Hello");
        let text;
        let person = prompt("Please enter your name:", "Chandan Lodhi");
        if (person == null || person == "") {
                 text = "Hi, check your incentive !";
            } else {
                text = "Hello " + person + " check your incentive!";
                }
            document.getElementById("user").innerHTML = text;
        }*/
        // Display congratulations if incentive is positive
        if (inper > 0) {
            document.getElementById("greet").innerHTML = "Congratulations ! 🎉🎊";
        } else {
            document.getElementById("greet").innerHTML = "";
        }

        // Display the result with rounding
        document.getElementById('result').innerHTML = `
            <p id="user">Hi, ${name} check your incentive !</p>
            <table>
                <tr><td>Your monthly Percentage :</td>
                    <td>${parseValue.toFixed(2)}</td></tr>
                <tr><td>Total Production :</td> 
                    <td>${totalpar.toFixed(2)}</td></tr>
                <tr><td>Difference :</td> 
                    <td>${inper.toFixed(2)}</td></tr>
                <tr><td>Your Incentive :</td>
                	<td><strong style="color: #27c93f;">₹ ${incentive.toFixed(2)}</strong></td></tr>
                <tr><td>Your Monthy Achieved :</td>
                    <td>${achieved.toFixed(2)}%</td></tr>    
            </table>
        `;
    });
</script>
